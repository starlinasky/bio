<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>starlina sky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#392c58;
    --bg-2:#573a56;
    --bg-3:#8a5a3f;
    --ink:#fff9f2;
    --ink-muted:rgba(255,249,242,0.82);
    --accent-gold:#ecd6a8;
    --glass:rgba(18,11,30,0.4);
    --glass-strong:rgba(255,255,255,0.16);
    --glass-border:rgba(255,255,255,0.32);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    min-height:100%;
    overflow-x:hidden;
  }

  body{
    font-family:'Jost', sans-serif;
    background:
      radial-gradient(circle at 82% 12%, rgba(255,236,205,0.55), transparent 45%),
      linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
    position:relative;
  }

  .sparkles{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }

  .sparkle{
    position:absolute;
    background:#fff;
    border-radius:50%;
    opacity:0;
    animation:twinkle-float linear infinite;
  }

  @keyframes twinkle-float{
    0%{ opacity:0; transform:translateY(0) scale(0.6); }
    10%{ opacity:.9; }
    50%{ opacity:.5; }
    100%{ opacity:0; transform:translateY(-120px) scale(1); }
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:400px;
    background:linear-gradient(160deg, var(--glass-strong), var(--glass) 70%);
    backdrop-filter:blur(22px) saturate(150%);
    -webkit-backdrop-filter:blur(22px) saturate(150%);
    border:1px solid var(--glass-border);
    border-radius:32px;
    padding:100px 32px 40px;
    text-align:center;
    box-shadow:
      0 20px 60px rgba(15,8,28,0.5),
      inset 0 1px 1px rgba(255,255,255,0.45);
  }

  .card-sheen{
    position:absolute;
    inset:0;
    border-radius:32px;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }

  .card-sheen::after{
    content:"";
    position:absolute;
    top:-60%;
    left:-60%;
    width:60%;
    height:220%;
    background:linear-gradient(75deg, transparent, rgba(255,255,255,0.35), transparent);
    transform:rotate(20deg);
    animation:sheen 6s ease-in-out .6s 1;
  }

  @keyframes sheen{
    0%{ left:-60%; }
    100%{ left:130%; }
  }

  .avatar-wrap{
    position:absolute;
    top:-64px;
    left:50%;
    transform:translateX(-50%);
    width:168px;
    height:168px;
  }

  .avatar{
    width:100%;
    height:100%;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.75);
    box-shadow:0 0 44px rgba(226,200,255,0.65), 0 8px 24px rgba(90,60,120,0.25);
    background:radial-gradient(circle at 35% 30%, #f4ecff, #b79fd9 60%, #8c72bb 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  /* Replace this block with <img src="your-photo.jpg" alt="starlina sky" style="width:100%;height:100%;object-fit:cover;"> */
  .avatar-initial{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:400;
    font-size:64px;
    color:#fff;
    text-shadow:0 2px 12px rgba(80,50,110,0.35);
  }

  .avatar-photo{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .avatar-glint{
    position:absolute;
    top:6px;
    right:2px;
    width:22px;
    height:22px;
    color:var(--accent-gold);
    filter:drop-shadow(0 0 6px rgba(255,240,210,0.8));
    animation:pulse 2.6s ease-in-out infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity:.55; transform:scale(0.9); }
    50%{ opacity:1; transform:scale(1.08); }
  }

  h1.name{
    font-family:'Fraunces', serif;
    font-weight:400;
    font-size:clamp(2.1rem, 7vw, 2.5rem);
    letter-spacing:0.01em;
    color:var(--ink);
    text-shadow:0 0 30px rgba(255,255,255,0.45);
  }

  h1.name em{
    font-style:italic;
    font-weight:400;
  }

  .divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin:18px 0 22px;
    color:var(--accent-gold);
  }

  .divider .line{
    width:52px;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
  }

  .tagline{
    font-weight:300;
    font-size:1.02rem;
    letter-spacing:0.015em;
    color:var(--ink-muted);
    margin-bottom:36px;
    text-shadow:0 1px 12px rgba(0,0,0,0.28);
  }

  .tagline .heart{
    color:#f3d6e6;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .link-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    text-decoration:none;
    color:var(--ink);
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.38);
    border-radius:20px;
    padding:18px 22px;
    backdrop-filter:blur(8px);
    transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
  }

  .link-btn:hover,
  .link-btn:focus-visible{
    transform:translateY(-2px);
    background:rgba(255,255,255,0.18);
    box-shadow:0 12px 28px rgba(120,90,160,0.3);
  }

  .link-btn:focus-visible{
    outline:2px solid rgba(255,255,255,0.8);
    outline-offset:3px;
  }

  .link-left{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .link-icon{
    width:22px;
    height:22px;
    flex-shrink:0;
    color:#f0e4ff;
  }

  .link-label{
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size:1.06rem;
    letter-spacing:0.03em;
  }

  .link-arrow{
    opacity:.75;
    transition:transform .25s ease;
  }

  .link-btn:hover .link-arrow{
    transform:translate(3px,-3px);
  }

  .footer{
    margin-top:38px;
    font-size:0.8rem;
    letter-spacing:0.05em;
    color:rgba(255,255,255,0.68);
    text-shadow:0 1px 8px rgba(0,0,0,0.25);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
